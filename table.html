    => thead
    => tbody
    => tfoot

    tr => table row
    th => table head => column [font-bold , align-center]
    td => table data => column [font-regular , align-left] -->


    <table border="1" width="50%" align="center" bgcolor="yellow" bordercolor="red" cellspacing="10" cellpadding="10">

                    <font color="white">demo</font>
                </td>
                <td>7896541230</td>
            </tr>
            <tr>
                <td>2.</td>
                <td>cdmi</td>
                <td rowspan="2">5689231047</td>
            </tr>
            <tr>
                <td>3.</td>

                <!-- <td>6689231047</td> -->
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th colspan="2">End</th>
                <!-- <th>End</th> -->
                <!-- <th>End</th> -->
            </tr>
        </tfoot>
    </table>


</body>
